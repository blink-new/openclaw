name: Deploy Blink Claw

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-blink-claw
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & push → Update all agents
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl auth docker

      # Build with Docker Buildx and push as :latest directly.
      # Uses registry-based layer cache for speed (~3-5 min after first build).
      # This replaces the broken flyctl --build-only --push approach which
      # pushed as a deployment tag that couldn't be resolved by flyctl machines update.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: registry.fly.io/blink-claw:latest
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_EXTENSIONS=telegram discord slack whatsapp
            OPENCLAW_DOCKER_APT_PACKAGES=gh jq python3 python3-pip ffmpeg tmux ripgrep sqlite3 unzip zip wget fzf fd-find bat
            OPENCLAW_INSTALL_BLINK_TOOLS=1
          cache-from: type=registry,ref=registry.fly.io/blink-claw:buildcache
          cache-to: type=registry,ref=registry.fly.io/blink-claw:buildcache,mode=max

      # Zero-downtime update strategy:
      #   • Stopped machines  → updated immediately in parallel (no user impact)
      #   • Running machines  → updated with --detach (non-blocking; machine config
      #     is updated and the restart happens asynchronously so in-flight agent
      #     tasks are not interrupted by this workflow waiting on them)
      # All updates fire in parallel so every agent converges within seconds,
      # not sequentially over potentially many minutes.
      - name: Update all running Blink Claw agents
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          IMAGE="registry.fly.io/blink-claw:latest"
          echo "Updating all agents to: $IMAGE"

          APPS=$(flyctl apps list --org blink-new --json \
            | jq -r '.[].Name' \
            | grep "^blink-claw-" \
            | grep -v "^blink-claw-manager$")

          if [ -z "$APPS" ]; then
            echo "No agent apps found — nothing to update."
            exit 0
          fi

          echo "Found $(echo "$APPS" | wc -l) agent apps"

          PIDS=()
          for APP in $APPS; do
            MACHINES_JSON=$(flyctl machines list --app "$APP" --json 2>/dev/null || echo "[]")

            STOPPED=$(echo "$MACHINES_JSON" | jq -r '.[] | select(.state == "stopped") | .id' 2>/dev/null || true)
            RUNNING=$(echo "$MACHINES_JSON" | jq -r '.[] | select(.state == "started") | .id' 2>/dev/null || true)

            # Stopped machines: update and wait (they're idle, safe to block briefly)
            for MACHINE in $STOPPED; do
              echo "  [stopped] $APP / $MACHINE — updating in background"
              flyctl machines update "$MACHINE" --image "$IMAGE" --app "$APP" --yes 2>&1 \
                | sed "s/^/  [$APP\/$MACHINE] /" &
              PIDS+=($!)
            done

            # Running machines: fire-and-forget with --detach so in-flight tasks aren't
            # interrupted by this workflow blocking on the restart
            for MACHINE in $RUNNING; do
              echo "  [running] $APP / $MACHINE — detached update (restarts asynchronously)"
              flyctl machines update "$MACHINE" --image "$IMAGE" --app "$APP" --yes --detach 2>&1 \
                | sed "s/^/  [$APP\/$MACHINE] /" &
              PIDS+=($!)
            done
          done

          # Wait for all background jobs and collect exit codes
          FAILED=0
          for PID in "${PIDS[@]}"; do
            wait "$PID" || FAILED=1
          done

          [ "$FAILED" -eq 1 ] && echo "::warning::One or more machine updates reported an error."
          echo "Done — all updates fired."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — check the logs above."
